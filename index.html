<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#020617;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* LOGIN */

#lockPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

#lockPage input{
padding:20px;
font-size:20px;
border-radius:12px;
border:none;
width:280px;
}

#lockPage button{
padding:20px;
font-size:20px;
border-radius:12px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
}

/* CHAT */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
width:100%;
}

/* TOP BAR */

#topBar{
background:#0f172a;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

#online{
font-size:20px;
color:#22c55e;
}

#clearBtn{
background:#ef4444;
padding:14px 22px;
border:none;
border-radius:10px;
color:white;
font-size:18px;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
width:100%;
}

/* MESSAGE */

.message{
padding:16px 20px;
font-size:20px;
border-radius:20px;
max-width:80%;
word-wrap:break-word;
}

.me{
background:#22c55e;
align-self:flex-end;
color:black;
}

.other{
background:#1e293b;
align-self:flex-start;
}

/* INPUT AREA */

#bottomBar{
display:flex;
gap:10px;
padding:15px;
background:#0f172a;
width:100%;
}

#message{
flex:1;
padding:18px;
font-size:20px;
border:none;
border-radius:12px;
}

#sendBtn{
padding:18px 26px;
font-size:20px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<div id="lockPage">

<h2>Private Chat</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Enter Chat</button>

<p id="error"></p>

</div>


<div id="chatPage">

<div id="topBar">

<div id="online">Online: 0</div>

<button id="clearBtn" onclick="clearChat()">Clear</button>

</div>

<div id="chat"></div>

<div id="bottomBar">

<input id="message" placeholder="Type message...">

<button id="sendBtn" onclick="sendMessage()">Send</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="app.js"></script>

</body>
</html>
