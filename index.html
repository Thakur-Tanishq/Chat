<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#020617;
color:white;
height:100vh;
}

/* LOGIN */

#lockPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
}

#lockPage input{
padding:12px;
border:none;
border-radius:8px;
width:250px;
}

#lockPage button{
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
transition:.3s;
}

#lockPage button:hover{
transform:scale(1.05);
}


/* CHAT */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
}

#topBar{
background:#0f172a;
padding:12px;
display:flex;
justify-content:space-between;
}

#online{
color:#22c55e;
font-size:13px;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGES */

.message{
padding:10px;
border-radius:10px;
max-width:65%;
word-wrap:break-word;
}

.me{
background:#22c55e;
align-self:flex-end;
color:black;
}

.other{
background:#1e293b;
align-self:flex-start;
}

.tick{
font-size:10px;
margin-left:5px;
}

#typing{
font-size:12px;
color:#94a3b8;
padding-left:10px;
}

#bottomBar{
display:flex;
padding:10px;
background:#0f172a;
gap:10px;
}

#message{
flex:1;
padding:12px;
border:none;
border-radius:8px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#clearBtn{
background:#ef4444;
}

</style>
</head>

<body>

<div id="lockPage">

<h2>Private Chat</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Enter Chat</button>

<p id="error"></p>

</div>


<div id="chatPage">

<div id="topBar">

<div id="online">Online: 0</div>

<button id="clearBtn" onclick="clearChat()">Clear</button>

</div>

<div id="chat"></div>

<div id="typing"></div>

<div id="bottomBar">

<input id="message" placeholder="Type message..." oninput="typing()">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="app.js"></script>

</body>
</html>
