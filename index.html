<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Chat</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0f172a;
padding:25px;
border-radius:10px;
text-align:center;
}

#chatPage{
display:none;
flex-direction:column;
}

#chat{
width:360px;
height:400px;
overflow-y:auto;
background:#1e293b;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.message{
background:#334155;
padding:8px;
margin:6px;
border-radius:6px;
}

input{
padding:10px;
border:none;
border-radius:6px;
margin:5px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

#online{
font-size:12px;
color:#22c55e;
}

#typing{
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="box" id="lockPage">

<h2>Secret Chat</h2>

<input id="username" placeholder="Enter username"><br>

<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Enter Chat</button>

<p id="error"></p>

</div>



<div class="box" id="chatPage">

<h3>Private Chat</h3>

<div id="online"></div>

<div id="chat"></div>

<div id="typing"></div>

<input id="message" placeholder="Message..." oninput="typing()">

<button onclick="sendMessage()">Send</button>

<button onclick="clearChat()">Clear Chat</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="app.js"></script>

</body>
</html>
