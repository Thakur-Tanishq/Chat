<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
height:100vh;
width:100vw;
}

/* LOGIN SCREEN */

#lockPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:25px;
}

#lockPage h2{
font-size:40px;
}

#lockPage input{
padding:20px;
font-size:20px;
border:none;
border-radius:15px;
width:320px;
}

#lockPage button{
padding:20px;
font-size:20px;
border:none;
border-radius:15px;
background:#22c55e;
color:white;
cursor:pointer;
width:240px;
}

/* CHAT PAGE */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
width:100vw;
}

/* TOP BAR */

#topBar{
background:#0f172a;
padding:25px;
font-size:26px;
display:flex;
justify-content:space-between;
align-items:center;
}

#online{
font-size:22px;
color:#22c55e;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:25px;
}

/* MESSAGE BUBBLES */

.message{
font-size:22px;
padding:22px;
border-radius:20px;
max-width:85%;
line-height:1.5;
}

.me{
background:#22c55e;
align-self:flex-end;
color:black;
}

.other{
background:#1e293b;
align-self:flex-start;
color:white;
}

.tick{
font-size:18px;
margin-left:8px;
}

/* TYPING */

#typing{
font-size:20px;
padding-left:20px;
color:#94a3b8;
}

/* BOTTOM BAR */

#bottomBar{
display:flex;
gap:15px;
padding:20px;
background:#0f172a;
}

/* MESSAGE INPUT */

#message{
flex:1;
padding:22px;
font-size:22px;
border:none;
border-radius:15px;
}

/* BUTTONS */

button{
font-size:22px;
padding:20px 28px;
border:none;
border-radius:15px;
background:#22c55e;
color:white;
cursor:pointer;
}

#clearBtn{
background:#ef4444;
}

</style>
</head>

<body>

<!-- PASSWORD / LOGIN PAGE -->

<div id="lockPage">

<h2>Private Chat</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Enter Chat</button>

<p id="error"></p>

</div>

<!-- CHAT PAGE -->

<div id="chatPage">

<div id="topBar">

<div id="online">Online: 0</div>

<button id="clearBtn" onclick="clearChat()">Clear</button>

</div>

<div id="chat"></div>

<div id="typing"></div>

<div id="bottomBar">

<input id="message" placeholder="Type message..." oninput="typing()">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="app.js"></script>

</body>
</html>
