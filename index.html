<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#020617;
color:white;
height:100vh;
width:100vw;
}

/* LOGIN PAGE */

#lockPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

#lockPage h2{
font-size:32px;
}

#lockPage input{
padding:18px;
font-size:18px;
border:none;
border-radius:10px;
width:280px;
}

#lockPage button{
padding:18px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
width:200px;
}


/* CHAT PAGE */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
width:100vw;
}


/* TOP BAR */

#topBar{
background:#0f172a;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

#online{
color:#22c55e;
font-size:18px;
}


/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:18px;
}


/* MESSAGE BUBBLES */

.message{
padding:18px;
border-radius:15px;
max-width:75%;
font-size:18px;
line-height:1.4;
}

.me{
background:#22c55e;
align-self:flex-end;
color:black;
}

.other{
background:#1e293b;
align-self:flex-start;
}

.tick{
font-size:14px;
margin-left:8px;
}


/* TYPING */

#typing{
font-size:16px;
color:#94a3b8;
padding-left:20px;
}


/* BOTTOM BAR */

#bottomBar{
display:flex;
padding:15px;
background:#0f172a;
gap:10px;
}

#message{
flex:1;
padding:18px;
font-size:18px;
border:none;
border-radius:12px;
}


/* BUTTONS */

button{
padding:18px 22px;
font-size:18px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

#clearBtn{
background:#ef4444;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="lockPage">

<h2>Private Chat</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Enter Chat</button>

<p id="error"></p>

</div>


<!-- CHAT -->

<div id="chatPage">

<div id="topBar">

<div id="online">Online: 0</div>

<button id="clearBtn" onclick="clearChat()">Clear</button>

</div>

<div id="chat"></div>

<div id="typing"></div>

<div id="bottomBar">

<input id="message" placeholder="Type message..." oninput="typing()">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="app.js"></script>

</body>
</html>
